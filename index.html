<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>TOEIC 단어장</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="TOEIC 단어장" />
<meta name="theme-color" content="#15171e" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
/>

<style>
  :root {
    --bg: #15171e;
    --surface: #1d2029;
    --surface-2: #252934;
    --line: #2e323e;
    --text: #eef0f5;
    --muted: #8b91a3;
    --faint: #5a6072;
    --accent: #8b8cff;
    --accent-text: #14151c;
    --accent-soft: rgba(139, 140, 255, 0.14);
    --known: #5ad6a0;
    --known-soft: rgba(90, 214, 160, 0.13);
    --unknown: #ff8f9c;
    --unknown-soft: rgba(255, 143, 156, 0.12);
    --shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    --radius: 18px;
  }
  [data-theme="light"] {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface-2: #eef1f6;
    --line: #e3e7ee;
    --text: #1b1e27;
    --muted: #697086;
    --faint: #9aa1b2;
    --accent: #5b5cf0;
    --accent-text: #ffffff;
    --accent-soft: rgba(91, 92, 240, 0.1);
    --known: #1fa97a;
    --known-soft: rgba(31, 169, 122, 0.12);
    --unknown: #e0566a;
    --unknown-soft: rgba(224, 86, 106, 0.1);
    --shadow: 0 8px 30px rgba(80, 90, 120, 0.12);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background 0.25s ease, color 0.25s ease;
  }
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px env(safe-area-inset-bottom);
  }

  header {
    padding: calc(20px + env(safe-area-inset-top)) 4px 14px;
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .brand h1 span {
    color: var(--accent);
  }
  .icon-row {
    display: flex;
    gap: 6px;
  }
  .icon-btn {
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 11px;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .progress-track {
    margin-top: 8px;
    height: 6px;
    border-radius: 100px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--known));
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  nav {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 14px;
    padding: 4px;
    margin: 16px 0 18px;
    border: 1px solid var(--line);
  }
  nav button {
    flex: 1;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    padding: 9px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  nav button.active {
    background: var(--surface-2);
    color: var(--text);
  }
  main {
    flex: 1;
    padding-bottom: 28px;
  }

  .goal-strip {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .ring {
    flex: 0 0 auto;
  }
  .goal-text {
    flex: 1;
  }
  .goal-text .gt-top {
    font-size: 14px;
    font-weight: 700;
  }
  .goal-text .gt-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .goal-go {
    border: 0;
    background: var(--accent-soft);
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 14px;
    border-radius: 11px;
    cursor: pointer;
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    justify-content: center;
  }
  .filter-pills button {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 100px;
    cursor: pointer;
  }
  .filter-pills button.on {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: transparent;
  }

  .card-stage {
    perspective: 1400px;
  }
  .flashcard {
    position: relative;
    width: 100%;
    height: 330px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .flashcard.flipped {
    transform: rotateY(180deg);
  }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 24px;
    background: var(--surface);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  .face.back {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, var(--surface-2), var(--surface));
  }
  .pos {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .word {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .speak-btn {
    margin-top: 14px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .flip-hint {
    position: absolute;
    bottom: 16px;
    font-size: 12px;
    color: var(--faint);
  }
  .meaning {
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .example {
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 300px;
  }
  .example b {
    color: var(--accent);
    font-weight: 700;
  }
  .badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 100px;
  }
  .badge.known {
    color: var(--known);
    background: var(--known-soft);
  }
  .badge.unknown {
    color: var(--unknown);
    background: var(--unknown-soft);
  }

  .swipe-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }
  .swipe-row button {
    flex: 1;
    border: 0;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 16px 0;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .swipe-row button:active {
    transform: scale(0.96);
  }
  .btn-unknown {
    background: var(--unknown-soft);
    color: var(--unknown);
  }
  .btn-known {
    background: var(--known-soft);
    color: var(--known);
  }
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .nav-row button {
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    width: 42px;
    height: 42px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
  }

  .quiz-score {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
  }
  .quiz-q {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .quiz-q .word {
    font-size: 32px;
  }
  .quiz-opt {
    width: 100%;
    text-align: left;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    padding: 17px 18px;
    border-radius: 15px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .quiz-opt.correct {
    background: var(--known-soft);
    border-color: transparent;
    color: var(--known);
  }
  .quiz-opt.wrong {
    background: var(--unknown-soft);
    border-color: transparent;
    color: var(--unknown);
  }
  .next-btn {
    width: 100%;
    border: 0;
    background: var(--accent);
    color: var(--accent-text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    padding: 15px 0;
    border-radius: var(--radius);
    margin-top: 6px;
    cursor: pointer;
  }

  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 13px 15px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
  }
  .search-bar input:focus {
    border-color: var(--accent);
  }
  .add-btn {
    border: 0;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 22px;
    font-weight: 700;
    width: 48px;
    border-radius: 13px;
    cursor: pointer;
  }
  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 9px;
  }
  .list-item .dot {
    width: 8px;
    height: 8px;
    border-radius: 100px;
    flex: 0 0 auto;
    background: var(--faint);
  }
  .list-item .dot.known {
    background: var(--known);
  }
  .list-item .dot.unknown {
    background: var(--unknown);
  }
  .list-item .li-word {
    font-size: 16px;
    font-weight: 700;
  }
  .list-item .li-mean {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .list-item .li-body {
    flex: 1;
    min-width: 0;
  }
  .li-speak {
    border: 0;
    background: var(--surface-2);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 9px;
    font-size: 14px;
    cursor: pointer;
  }
  .li-tag {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 7px;
    border-radius: 100px;
  }
  .empty {
    text-align: center;
    color: var(--faint);
    font-size: 14px;
    padding: 50px 0;
    line-height: 1.6;
  }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-width: 460px;
    padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
    animation: up 0.25s ease;
    max-height: 88vh;
    overflow-y: auto;
  }
  @keyframes up {
    from {
      transform: translateY(40px);
      opacity: 0;
    }
  }
  .modal h3 {
    margin: 0 0 4px;
    font-size: 17px;
    font-weight: 800;
  }
  .modal .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0 0 16px;
    line-height: 1.5;
  }
  .field-label {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--muted);
    margin: 14px 0 7px;
  }
  .modal input,
  .modal textarea {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 13px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 10px;
    outline: none;
    resize: vertical;
  }
  .modal input:focus,
  .modal textarea:focus {
    border-color: var(--accent);
  }
  .stepper {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface-2);
    border-radius: 12px;
    padding: 8px 14px;
    margin-bottom: 4px;
  }
  .stepper button {
    border: 0;
    background: var(--surface);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
  }
  .stepper .val {
    flex: 1;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .modal-actions button {
    flex: 1;
    border: 0;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 0;
    border-radius: 13px;
    cursor: pointer;
  }
  .modal-actions .cancel {
    background: var(--surface-2);
    color: var(--muted);
  }
  .modal-actions .save {
    background: var(--accent);
    color: var(--accent-text);
  }
  .full-btn {
    width: 100%;
    border: 0;
    color: var(--accent-text);
    background: var(--accent);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 13px 0;
    border-radius: 13px;
    cursor: pointer;
  }
  .danger-btn {
    width: 100%;
    border: 1px solid var(--unknown-soft);
    background: var(--unknown-soft);
    color: var(--unknown);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 13px 0;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 8px;
  }
  .hidden {
    display: none !important;
  }
  code {
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>

<div id="app">
  <header>
    <div class="brand">
      <h1>TOEIC <span>단어장</span></h1>
      <div class="icon-row">
        <button class="icon-btn" id="themeBtn" title="테마">🌙</button>
        <button class="icon-btn" id="settingsBtn" title="설정">⚙️</button>
      </div>
    </div>
    <div class="meta-row">
      <span>전체 진행</span>
      <span id="counter">0 / 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </header>

  <nav>
    <button data-tab="card" class="active">카드</button>
    <button data-tab="quiz">퀴즈</button>
    <button data-tab="list">단어장</button>
  </nav>

  <main>
    <section id="tab-card">
      <div class="goal-strip">
        <svg class="ring" width="46" height="46" viewBox="0 0 46 46">
          <circle cx="23" cy="23" r="19" fill="none" stroke="var(--surface-2)" stroke-width="5" />
          <circle id="ringFill" cx="23" cy="23" r="19" fill="none" stroke="var(--accent)"
            stroke-width="5" stroke-linecap="round" stroke-dasharray="119.4"
            stroke-dashoffset="119.4" transform="rotate(-90 23 23)" />
        </svg>
        <div class="goal-text">
          <div class="gt-top" id="goalTop">오늘의 목표</div>
          <div class="gt-sub" id="goalSub">하루 학습량을 채워보세요</div>
        </div>
        <button class="goal-go" id="goalGo">오늘 학습</button>
      </div>

      <div class="filter-pills">
        <button data-filter="all" class="on">전체</button>
        <button data-filter="unknown">아직 몰라요</button>
        <button data-filter="known">외운 단어</button>
      </div>

      <div class="card-stage">
        <div class="flashcard" id="flashcard">
          <div class="face front">
            <div class="badge" id="cardBadge"></div>
            <div class="pos" id="cardPos"></div>
            <div class="word" id="cardWord"></div>
            <button class="speak-btn" id="cardSpeak" title="발음 듣기">🔊</button>
            <div class="flip-hint">탭하면 뜻이 보여요</div>
          </div>
          <div class="face back">
            <div class="meaning" id="cardMeaning"></div>
            <div class="example" id="cardExample"></div>
          </div>
        </div>
      </div>

      <div class="swipe-row">
        <button class="btn-unknown" id="markUnknown">아직 몰라요</button>
        <button class="btn-known" id="markKnown">외웠어요</button>
      </div>
      <div class="nav-row">
        <button id="prevCard">‹</button>
        <span id="cardCount">–</span>
        <button id="nextCard">›</button>
      </div>
    </section>

    <section id="tab-quiz" class="hidden">
      <div class="quiz-score" id="quizScore">맞은 개수 0 · 푼 문제 0</div>
      <div class="quiz-q">
        <div class="pos" id="quizPos"></div>
        <div class="word" id="quizWord"></div>
        <button class="speak-btn" id="quizSpeak" title="발음 듣기">🔊</button>
      </div>
      <div id="quizOptions"></div>
      <button class="next-btn hidden" id="quizNext">다음 문제 →</button>
    </section>

    <section id="tab-list" class="hidden">
      <div class="search-bar">
        <input id="searchInput" placeholder="단어 또는 뜻 검색" />
        <button class="add-btn" id="openAdd">+</button>
      </div>
      <div id="listContainer"></div>
    </section>
  </main>
</div>

<div class="modal-bg hidden" id="addModal">
  <div class="modal">
    <h3>내 단어 추가</h3>
    <p class="sub">단어 하나를 직접 추가해요.</p>
    <input id="inWord" placeholder="단어 (예: efficient)" autocomplete="off" />
    <input id="inMean" placeholder="뜻 (예: 효율적인)" autocomplete="off" />
    <input id="inPos" placeholder="품사 (선택, 예: adj.)" autocomplete="off" />
    <input id="inExample" placeholder="예문 (선택)" autocomplete="off" />
    <div class="modal-actions">
      <button class="cancel" data-close>취소</button>
      <button class="save" id="saveAdd">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="setModal">
  <div class="modal">
    <h3>설정</h3>
    <p class="sub">하루 목표량 설정, 단어 가져오기, 학습 기록 초기화를 할 수 있어요.</p>

    <div class="field-label">하루 학습 목표 (단어 수)</div>
    <div class="stepper">
      <button id="goalMinus">−</button>
      <div class="val" id="goalVal">20</div>
      <button id="goalPlus">+</button>
    </div>

    <div class="field-label">단어 한 번에 가져오기</div>
    <p class="sub" style="margin-bottom:8px">
      한 줄에 하나씩, <b>단어, 뜻, 예문(선택)</b> 순서로 붙여넣으세요. 쉼표나 탭으로 구분돼요.<br />
      예: <code>efficient, 효율적인</code>

  // 저장: Claude 앱(window.storage) → 사파리/홈화면(localStorage) → 메모리 순으로 자동 선택
  const mem = {};
  const hasWS =
    typeof window !== "undefined" &&
    window.storage &&
    typeof window.storage.get === "function";
  function lsGet(k) {
    try {
      const v = localStorage.getItem(k);
      return v == null ? null : JSON.parse(v);
    } catch (e) { return null; }
  }
  function lsSet(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {}
  }
  const store = {
    async get(k) {
      if (hasWS) {
        try {
          const r = await window.storage.get(k);
          if (r) return JSON.parse(r.value);
        } catch (e) {}
      }
      const ls = lsGet(k);
      if (ls !== null) return ls;
      return mem[k] ?? null;
    },
    async set(k, v) {
      mem[k] = v;
      if (hasWS) {
        try { await window.storage.set(k, JSON.stringify(v)); return; } catch (e) {}
      }
      lsSet(k, v);
    },
  };

  let words = [];
  let progress = {};
  let settings = { goal: 20, theme: "dark" };
  let today = { date: todayKey(), list: [] };
  let cardFilter = "all";
  let cardIndex = 0;
  let quizState = { correct: 0, total: 0, answered: false, current: null };

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }
  function deckFromBase() {
    return BASE_WORDS.map((w) => ({ word: w[0], mean: w[1], pos: w[2], ex: w[3], custom: false }));
  }

  async function init() {
    const custom = (await store.get("toeic:custom")) || [];
    progress = (await store.get("toeic:progress")) || {};
    settings = Object.assign({ goal: 20, theme: "dark" }, (await store.get("toeic:settings")) || {});
    const savedToday = (await store.get("toeic:today")) || null;
    if (savedToday && savedToday.date === todayKey()) today = savedToday;
    else { today = { date: todayKey(), list: [] }; await store.set("toeic:today", today); }
    words = deckFromBase().concat(custom.map((c) => ({ ...c, custom: true })));
    applyTheme();
    document.getElementById("goalVal").textContent = settings.goal;
    renderAll();
  }

  function applyTheme() {
    if (settings.theme === "light") document.documentElement.setAttribute("data-theme", "light");
    else document.documentElement.removeAttribute("data-theme");
    document.getElementById("themeBtn").textContent = settings.theme === "light" ? "☀️" : "🌙";
  }
  document.getElementById("themeBtn").addEventListener("click", async () => {
    settings.theme = settings.theme === "light" ? "dark" : "light";
    applyTheme();
    await store.set("toeic:settings", settings);
  });

  function speak(text) {
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  function renderHeader() {
    const known = words.filter((w) => progress[w.word] === "known").length;
    document.getElementById("counter").textContent = known + " / " + words.length;
    const pct = words.length ? (known / words.length) * 100 : 0;
    document.getElementById("progressFill").style.width = pct + "%";
  }
  function renderGoal() {
    const done = today.list.length;
    const goal = settings.goal;
    document.getElementById("goalTop").textContent = "오늘 " + done + " / " + goal + " 단어";
    document.getElementById("goalSub").textContent =
      done >= goal ? "오늘 목표 달성! 🎉" : "조금만 더 하면 목표 달성!";
    const C = 2 * Math.PI * 19;
    const ratio = Math.min(done / goal, 1);
    const rf = document.getElementById("ringFill");
    rf.setAttribute("stroke-dashoffset", C * (1 - ratio));
    rf.setAttribute("stroke", ratio >= 1 ? "var(--known)" : "var(--accent)");
  }
  async function recordToday(word) {
    if (today.date !== todayKey()) today = { date: todayKey(), list: [] };
    if (!today.list.includes(word)) {
      today.list.push(word);
      await store.set("toeic:today", today);
      renderGoal();
    }
  }

  const flashcard = document.getElementById("flashcard");
  function filteredCards() {
    if (cardFilter === "all") return words;
    if (cardFilter === "unknown") return words.filter((w) => progress[w.word] !== "known");
    return words.filter((w) => progress[w.word] === "known");
  }
  function curWord() {
    const deck = filteredCards();
    if (!deck.length) return null;
    if (cardIndex >= deck.length) cardIndex = 0;
    if (cardIndex < 0) cardIndex = deck.length - 1;
    return deck[cardIndex];
  }
  function renderCard() {
    const deck = filteredCards();
    const count = document.getElementById("cardCount");
    flashcard.classList.remove("flipped");
    if (!deck.length) {
      document.getElementById("cardWord").textContent = "🎉";
      document.getElementById("cardPos").textContent = "";
      document.getElementById("cardMeaning").textContent = "단어가 없어요";
      document.getElementById("cardExample").textContent =
        cardFilter === "known" ? "아직 외운 단어가 없어요" : "이 분류에 단어가 없어요";
      document.getElementById("cardBadge").className = "badge";
      document.getElementById("cardSpeak").style.visibility = "hidden";
      count.textContent = "0 / 0";
      return;
    }
    document.getElementById("cardSpeak").style.visibility = "visible";
    if (cardIndex >= deck.length) cardIndex = 0;
    const w = deck[cardIndex];
    document.getElementById("cardPos").textContent = w.pos || "";
    document.getElementById("cardWord").textContent = w.word;
    document.getElementById("cardMeaning").textContent = w.mean;
    const cardExEl = document.getElementById("cardExample");
    cardExEl.innerHTML = w.ex || "";
    cardExEl.style.display = w.ex ? "" : "none";
    const badge = document.getElementById("cardBadge");
    const st = progress[w.word];
    if (st === "known") { badge.className = "badge known"; badge.textContent = "외움"; }
    else if (st === "unknown") { badge.className = "badge unknown"; badge.textContent = "복습"; }
    else { badge.className = "badge"; badge.textContent = ""; }
    count.textContent = cardIndex + 1 + " / " + deck.length;
  }
  flashcard.addEventListener("click", () => flashcard.classList.toggle("flipped"));
  document.getElementById("cardSpeak").addEventListener("click", (e) => {
    e.stopPropagation();
    const w = curWord();
    if (w) speak(w.word);
  });

  async function mark(state) {
    const w = curWord();
    if (!w) return;
    progress[w.word] = state;
    await store.set("toeic:progress", progress);
    await recordToday(w.word);
    if (cardFilter === "all") cardIndex++;
    renderCard();
    renderHeader();
    renderList();
  }
  document.getElementById("markKnown").addEventListener("click", () => mark("known"));
  document.getElementById("markUnknown").addEventListener("click", () => mark("unknown"));
  document.getElementById("nextCard").addEventListener("click", () => { cardIndex++; renderCard(); });
  document.getElementById("prevCard").addEventListener("click", () => { cardIndex--; renderCard(); });
  document.querySelectorAll(".filter-pills button").forEach((b) => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".filter-pills button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
      cardFilter = b.dataset.filter;
      cardIndex = 0;
      renderCard();
    });
  });
  document.getElementById("goalGo").addEventListener("click", () => {
    document.querySelectorAll(".filter-pills button").forEach((x) => x.classList.remove("on"));
    document.querySelector('.filter-pills [data-filter="unknown"]').classList.add("on");
    cardFilter = "unknown";
    cardIndex = 0;
    renderCard();
  });

  function newQuiz() {
    quizState.answered = false;
    document.getElementById("quizNext").classList.add("hidden");
    const answer = words[Math.floor(Math.random() * words.length)];
    quizState.current = answer;
    const opts = [answer];
    const others = words.filter((w) => w.word !== answer.word);
    while (opts.length < 4 && others.length) {
      opts.push(others.splice(Math.floor(Math.random() * others.length), 1)[0]);
    }
    for (let i = opts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [opts[i], opts[j]] = [opts[j], opts[i]];
    }
    document.getElementById("quizPos").textContent = answer.pos || "";
    document.getElementById("quizWord").textContent = answer.word;
    const box = document.getElementById("quizOptions");
    box.innerHTML = "";
    opts.forEach((o) => {
      const btn = document.createElement("button");
      btn.className = "quiz-opt";
      btn.textContent = o.mean;
      btn.addEventListener("click", () => answerQuiz(btn, o, answer));
      box.appendChild(btn);
    });
    renderQuizScore();
  }
  async function answerQuiz(btn, chosen, answer) {
    if (quizState.answered) return;
    quizState.answered = true;
    quizState.total++;
    const correct = chosen.word === answer.word;
    if (correct) quizState.correct++;
    document.querySelectorAll(".quiz-opt").forEach((b) => {
      b.disabled = true;
      if (b.textContent === answer.mean) b.classList.add("correct");
    });
    if (!correct) { btn.classList.add("wrong"); progress[answer.word] = "unknown"; }
    else if (!progress[answer.word]) progress[answer.word] = "known";
    await store.set("toeic:progress", progress);
    await recordToday(answer.word);
    renderHeader();
    renderQuizScore();
    document.getElementById("quizNext").classList.remove("hidden");
  }
  function renderQuizScore() {
    document.getElementById("quizScore").textContent =
      "맞은 개수 " + quizState.correct + " · 푼 문제 " + quizState.total;
  }
  document.getElementById("quizNext").addEventListener("click", newQuiz);
  document.getElementById("quizSpeak").addEventListener("click", () => {
    if (quizState.current) speak(quizState.current.word);
  });

  const searchInput = document.getElementById("searchInput");
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])
    );
  }
  function renderList() {
    const q = (searchInput.value || "").trim().toLowerCase();
    const box = document.getElementById("listContainer");
    const items = words.filter(
      (w) => !q || w.word.toLowerCase().includes(q) || w.mean.includes(q)
    );
    if (!items.length) {
      box.innerHTML = '<div class="empty">검색 결과가 없어요</div>';
      return;
    }
    box.innerHTML = "";
    items.forEach((w) => {
      const st = progress[w.word] || "new";
      const row = document.createElement("div");
      row.className = "list-item";
      row.innerHTML =
        '<div class="dot ' + (st === "known" ? "known" : st === "unknown" ? "unknown" : "") + '"></div>' +
        '<div class="li-body"><div class="li-word">' + escapeHtml(w.word) + "</div>" +
        '<div class="li-mean">' + escapeHtml(w.mean) + "</div></div>" +
        (w.custom ? '<div class="li-tag">내 단어</div>' : "") +
        '<button class="li-speak">🔊</button>';
      row.querySelector(".li-speak").addEventListener("click", () => speak(w.word));
      box.appendChild(row);
    });
  }
  searchInput.addEventListener("input", renderList);

  function openModal(id) { document.getElementById(id).classList.remove("hidden"); }
  function closeModal(el) { el.classList.add("hidden"); }
  document.querySelectorAll(".modal-bg").forEach((bg) => {
    bg.addEventListener("click", (e) => { if (e.target === bg) closeModal(bg); });
  });
  document.querySelectorAll("[data-close]").forEach((b) =>
    b.addEventListener("click", (e) => closeModal(e.target.closest(".modal-bg")))
  );

  document.getElementById("openAdd").addEventListener("click", () => {
    openModal("addModal");
    document.getElementById("inWord").focus();
  });
  document.getElementById("saveAdd").addEventListener("click", async () => {
    const word = document.getElementById("inWord").value.trim();
    const mean = document.getElementById("inMean").value.trim();
    const pos = document.getElementById("inPos").value.trim();
    const ex = document.getElementById("inExample").value.trim();
    if (!word || !mean) { alert("단어와 뜻은 꼭 입력해주세요"); return; }
    const custom = (await store.get("toeic:custom")) || [];
    custom.push({ word, mean, pos, ex });
    await store.set("toeic:custom", custom);
    words.push({ word, mean, pos, ex, custom: true });
    ["inWord", "inMean", "inPos", "inExample"].forEach((i) => (document.getElementById(i).value = ""));
    closeModal(document.getElementById("addModal"));
    renderAll();
  });

  document.getElementById("settingsBtn").addEventListener("click", () => openModal("setModal"));
  document.getElementById("goalPlus").addEventListener("click", async () => {
    settings.goal = Math.min(settings.goal + 5, 200);
    document.getElementById("goalVal").textContent = settings.goal;
    await store.set("toeic:settings", settings);
    renderGoal();
  });
  document.getElementById("goalMinus").addEventListener("click", async () => {
    settings.goal = Math.max(settings.goal - 5, 5);
    document.getElementById("goalVal").textContent = settings.goal;
    await store.set("toeic:settings", settings);
    renderGoal();
  });

  document.getElementById("importBtn").addEventListener("click", async () => {
    const raw = document.getElementById("importBox").value.trim();
    if (!raw) { alert("가져올 단어를 붙여넣어 주세요"); return; }
    const lines = raw.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
    const custom = (await store.get("toeic:custom")) || [];
    let added = 0;
    const existing = new Set(words.map((w) => w.word.toLowerCase()));
    lines.forEach((line) => {
      const parts = line.split(/[\t,]/).map((p) => p.trim());
      const word = parts[0];
      const mean = parts[1] || "";
      const ex = parts[2] || "";
      if (!word || !mean) return;
      if (existing.has(word.toLowerCase())) return;
      existing.add(word.toLowerCase());
      const entry = { word, mean, pos: "", ex };
      custom.push(entry);
      words.push({ ...entry, custom: true });
      added++;
    });
    await store.set("toeic:custom", custom);
    document.getElementById("importBox").value = "";
    alert(added + "개 단어를 추가했어요!");
    closeModal(document.getElementById("setModal"));
    renderAll();
  });

  document.getElementById("resetProgress").addEventListener("click", async () => {
    if (!confirm("외움/복습 표시를 모두 지울까요? (단어는 그대로예요)")) return;
    progress = {};
    today = { date: todayKey(), list: [] };
    await store.set("toeic:progress", progress);
    await store.set("toeic:today", today);
    closeModal(document.getElementById("setModal"));
    renderAll();
  });

  document.querySelectorAll("nav button").forEach((b) => {
    b.addEventListener("click", () => {
      document.querySelectorAll("nav button").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      const tab = b.dataset.tab;
      ["card", "quiz", "list"].forEach((t) =>
        document.getElementById("tab-" + t).classList.toggle("hidden", t !== tab)
      );
      if (tab === "quiz" && !quizState.current) newQuiz();
    });
  });

  function renderAll() {
    renderHeader();
    renderGoal();
    renderCard();
    renderList();
  }

  init();
</script>
